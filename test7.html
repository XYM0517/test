<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            letter-spacing: 4px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 16px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 28px;
            min-width: 120px;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .info-value.high {
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.2), 0 0 30px rgba(0, 255, 255, 0.2);
            background: #050510;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            border: none;
            color: #fff;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 26, 0.95);
            border: 2px solid #ff00ff;
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            display: none;
            box-shadow: 0 0 80px rgba(255, 0, 255, 0.4);
            z-index: 100;
        }

        .game-over h2 {
            font-size: 32px;
            color: #ff00ff;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }

        .game-over p {
            font-size: 18px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .game-over .final-score {
            font-size: 28px;
            color: #00ffff;
            margin: 16px 0;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .instructions {
            margin-top: 20px;
            color: #666;
            font-size: 13px;
            line-height: 1.8;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 2px 8px;
            margin: 0 2px;
            font-family: monospace;
            color: #00ffff;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            justify-content: center;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            padding: 0;
            font-size: 24px;
            border-radius: 50%;
        }

        .mobile-controls .empty {
            visibility: hidden;
        }

        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            .mobile-controls { display: grid; }
            canvas { max-width: 90vw; height: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>霓虹贪吃蛇</h1>
        <p class="subtitle">收集星星，挑战最高分</p>

        <div class="game-info">
            <div class="info-box">
                <div class="info-label">当前分数</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">最高分</div>
                <div class="info-value high" id="highScore">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">速度等级</div>
                <div class="info-value" id="level">1</div>
            </div>
        </div>

        <canvas id="game" width="400" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
        </div>

        <div class="mobile-controls">
            <div class="empty"></div>
            <button id="upBtn">↑</button>
            <div class="empty"></div>
            <button id="leftBtn">←</button>
            <div class="empty"></div>
            <button id="rightBtn">→</button>
            <div class="empty"></div>
            <button id="downBtn">↓</button>
            <div class="empty"></div>
        </div>

        <div class="instructions">
            <p>操作方式：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向</p>
            <p><kbd>空格</kbd> 暂停/继续 · 吃到星星得 10 分，每 50 分速度提升一级</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>撞到自己啦！</p>
        <div class="final-score" id="finalScore">0</div>
        <button id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const levelEl = document.getElementById('level');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake, direction, nextDirection, food, score, highScore, level, gameSpeed;
        let gameLoop, isPaused, isPlaying;
        let particles = [];

        highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        highScoreEl.textContent = highScore;

        function init() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            level = 1;
            gameSpeed = 150;
            particles = [];
            spawnFood();
            updateUI();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS),
                    pulse: 0
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
            }
        }

        function updateUI() {
            scoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            levelEl.textContent = level;
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID, 0);
                ctx.lineTo(i * GRID, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * GRID);
                ctx.lineTo(canvas.width, i * GRID);
                ctx.stroke();
            }

            // 食物（星星）
            food.pulse = (food.pulse + 0.1) % (Math.PI * 2);
            const pulseSize = Math.sin(food.pulse) * 3 + 3;
            ctx.save();
            ctx.translate(food.x * GRID + GRID/2, food.y * GRID + GRID/2);
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffff00';
            drawStar(0, 0, 5, GRID/2 - 2 + pulseSize/2, GRID/4);
            ctx.restore();

            // 蛇
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                const ratio = 1 - (i / snake.length) * 0.5;
                ctx.save();
                ctx.shadowColor = isHead ? '#00ffff' : '#ff00ff';
                ctx.shadowBlur = isHead ? 20 : 10;

                const gradient = ctx.createLinearGradient(
                    seg.x * GRID, seg.y * GRID,
                    seg.x * GRID + GRID, seg.y * GRID + GRID
                );
                if (isHead) {
                    gradient.addColorStop(0, '#00ffff');
                    gradient.addColorStop(1, '#0088ff');
                } else {
                    gradient.addColorStop(0, `rgba(255, 0, 255, ${ratio})`);
                    gradient.addColorStop(1, `rgba(150, 0, 255, ${ratio})`);
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);

                if (isHead) {
                    ctx.fillStyle = '#fff';
                    const eyeOffset = 4;
                    let ex1, ey1, ex2, ey2;
                    if (direction.x === 1) {
                        ex1 = seg.x * GRID + GRID - eyeOffset; ey1 = seg.y * GRID + 5;
                        ex2 = seg.x * GRID + GRID - eyeOffset; ey2 = seg.y * GRID + GRID - 7;
                    } else if (direction.x === -1) {
                        ex1 = seg.x * GRID + eyeOffset; ey1 = seg.y * GRID + 5;
                        ex2 = seg.x * GRID + eyeOffset; ey2 = seg.y * GRID + GRID - 7;
                    } else if (direction.y === -1) {
                        ex1 = seg.x * GRID + 5; ey1 = seg.y * GRID + eyeOffset;
                        ex2 = seg.x * GRID + GRID - 7; ey2 = seg.y * GRID + eyeOffset;
                    } else {
                        ex1 = seg.x * GRID + 5; ey1 = seg.y * GRID + GRID - eyeOffset;
                        ex2 = seg.x * GRID + GRID - 7; ey2 = seg.y * GRID + GRID - eyeOffset;
                    }
                    ctx.fillRect(ex1, ey1, 3, 3);
                    ctx.fillRect(ex2, ey2, 3, 3);
                }
                ctx.restore();
            });

            // 粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(p.x, p.y, 3, 3);
                ctx.restore();
            });
        }

        function drawStar(cx, cy, spikes, outerR, innerR) {
            let rot = Math.PI / 2 * 3;
            let x = cx, y = cy;
            const step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerR);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerR;
                y = cy + Math.sin(rot) * outerR;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerR;
                y = cy + Math.sin(rot) * innerR;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerR);
            ctx.closePath();
            ctx.fill();
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * GRID + GRID/2,
                    y: y * GRID + GRID/2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color: color
                });
            }
        }

        function update() {
            direction = nextDirection;
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 碰撞检测
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                createParticles(food.x, food.y, '#ffff00', 15);
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    gameSpeed = Math.max(60, 150 - (level - 1) * 15);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, gameSpeed);
                }
                spawnFood();
                updateUI();
            } else {
                snake.pop();
            }
        }

        function tick() {
            if (!isPaused && isPlaying) {
                update();
            }
            draw();
        }

        function startGame() {
            init();
            isPlaying = true;
            isPaused = false;
            gameOverEl.style.display = 'none';
            startBtn.textContent = '重新开始';
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, gameSpeed);
            draw();
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameLoop);
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function togglePause() {
            if (!isPlaying) return;
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }
            if (!isPlaying || isPaused) return;

            if ((key === 'arrowup' || key === 'w') && direction.y !== 1) {
                nextDirection = {x: 0, y: -1};
            } else if ((key === 'arrowdown' || key === 's') && direction.y !== -1) {
                nextDirection = {x: 0, y: 1};
            } else if ((key === 'arrowleft' || key === 'a') && direction.x !== 1) {
                nextDirection = {x: -1, y: 0};
            } else if ((key === 'arrowright' || key === 'd') && direction.x !== -1) {
                nextDirection = {x: 1, y: 0};
            }
        });

        // 移动端按钮
        document.getElementById('upBtn').addEventListener('click', () => {
            if (isPlaying && !isPaused && direction.y !== 1) nextDirection = {x: 0, y: -1};
        });
        document.getElementById('downBtn').addEventListener('click', () => {
            if (isPlaying && !isPaused && direction.y !== -1) nextDirection = {x: 0, y: 1};
        });
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (isPlaying && !isPaused && direction.x !== 1) nextDirection = {x: -1, y: 0};
        });
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (isPlaying && !isPaused && direction.x !== -1) nextDirection = {x: 1, y: 0};
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', startGame);

        // 初始画面
        init();
        draw();
    </script>
</body>
</html>
