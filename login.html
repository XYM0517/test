<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px 36px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #bbb;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .form-options label {
            color: #666;
            cursor: pointer;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
            opacity: 0.95;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            margin: 0 6px;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #ccc;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .divider span {
            padding: 0 12px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: background 0.2s, border-color 0.2s;
        }

        .social-btn:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }

        .alert {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #cf1322;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>请输入您的账号信息</p>
        </div>

        <div class="alert" id="alert">
            用户名或密码错误，请重试
        </div>

        <form id="loginForm" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrap">
                    <span class="icon">👤</span>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrap">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember"> 记住我
                </label>
                <a href="#">忘记密码？</a>
            </div>

            <button type="submit" class="btn-login">登 录</button>
        </form>

        <div class="divider">
            <span>其他登录方式</span>
        </div>

        <div class="social-login">
            <button class="social-btn" onclick="alert('微信登录')">微信</button>
            <button class="social-btn" onclick="alert('GitHub登录')">GitHub</button>
            <button class="social-btn" onclick="alert('Google登录')">Google</button>
        </div>

        <div class="login-footer">
            还没有账号？<a href="#">立即注册</a>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');

            // 模拟登录验证
            if (username === 'admin' && password === '123456') {
                alert('登录成功！欢迎，' + username);
                alertBox.classList.remove('show');
            } else {
                alertBox.classList.add('show');
            }
            return false;
        }
    </script>
</body>
</html>
