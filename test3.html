<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .calculator {
            background: #1c1c1e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 320px;
            padding: 24px;
        }

        .display {
            background: #000;
            color: #fff;
            text-align: right;
            padding: 20px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .history {
            color: #888;
            font-size: 16px;
            min-height: 22px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current {
            color: #fff;
            font-size: 42px;
            font-weight: 300;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 50%;
            height: 60px;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            color: #fff;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            filter: brightness(1.2);
        }

        .btn-fn {
            background: #a5a5a5;
            color: #000;
        }

        .btn-op {
            background: #ff9f0a;
        }

        .btn-num {
            background: #333333;
        }

        .btn-zero {
            grid-column: span 2;
            border-radius: 30px;
        }

        .btn-eq {
            background: #ff9f0a;
        }

        .title {
            text-align: center;
            color: #fff;
            font-size: 18px;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        @media (max-width: 360px) {
            .calculator {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">计 算 器</div>
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="btn-fn" onclick="clearAll()">AC</button>
            <button class="btn-fn" onclick="toggleSign()">±</button>
            <button class="btn-fn" onclick="inputPercent()">%</button>
            <button class="btn-op" onclick="inputOperator('/')">÷</button>

            <button class="btn-num" onclick="inputNumber('7')">7</button>
            <button class="btn-num" onclick="inputNumber('8')">8</button>
            <button class="btn-num" onclick="inputNumber('9')">9</button>
            <button class="btn-op" onclick="inputOperator('*')">×</button>

            <button class="btn-num" onclick="inputNumber('4')">4</button>
            <button class="btn-num" onclick="inputNumber('5')">5</button>
            <button class="btn-num" onclick="inputNumber('6')">6</button>
            <button class="btn-op" onclick="inputOperator('-')">−</button>

            <button class="btn-num" onclick="inputNumber('1')">1</button>
            <button class="btn-num" onclick="inputNumber('2')">2</button>
            <button class="btn-num" onclick="inputNumber('3')">3</button>
            <button class="btn-op" onclick="inputOperator('+')">+</button>

            <button class="btn-num btn-zero" onclick="inputNumber('0')">0</button>
            <button class="btn-num" onclick="inputDot()">.</button>
            <button class="btn-eq" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let current = '0';
        let history = '';
        let operator = null;
        let previous = null;
        let shouldReset = false;

        const currentEl = document.getElementById('current');
        const historyEl = document.getElementById('history');
        const opMap = { '+': '+', '-': '-', '*': '×', '/': '÷' };

        function updateDisplay() {
            currentEl.textContent = current;
            historyEl.textContent = history;
        }

        function inputNumber(num) {
            if (shouldReset) {
                current = '0';
                shouldReset = false;
            }
            if (current === '0' && num !== '.') {
                current = num;
            } else {
                if (current.replace(/[-.]/g, '').length < 12) {
                    current += num;
                }
            }
            updateDisplay();
        }

        function inputDot() {
            if (shouldReset) {
                current = '0';
                shouldReset = false;
            }
            if (current.indexOf('.') === -1) {
                current += '.';
            }
            updateDisplay();
        }

        function inputOperator(op) {
            if (operator !== null && !shouldReset) {
                calculate();
            }
            previous = parseFloat(current);
            operator = op;
            history = previous + ' ' + opMap[op];
            shouldReset = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || previous === null) return;
            const curr = parseFloat(current);
            let result = 0;
            switch (operator) {
                case '+': result = previous + curr; break;
                case '-': result = previous - curr; break;
                case '*': result = previous * curr; break;
                case '/':
                    if (curr === 0) {
                        current = 'Error';
                        history = '';
                        operator = null;
                        previous = null;
                        shouldReset = true;
                        updateDisplay();
                        return;
                    }
                    result = previous / curr;
                    break;
            }
            result = Math.round(result * 1e10) / 1e10;
            history = previous + ' ' + opMap[operator] + ' ' + curr + ' =';
            current = String(result);
            operator = null;
            previous = null;
            shouldReset = true;
            updateDisplay();
        }

        function clearAll() {
            current = '0';
            history = '';
            operator = null;
            previous = null;
            shouldReset = false;
            updateDisplay();
        }

        function toggleSign() {
            if (current === '0' || current === 'Error') return;
            current = current.startsWith('-') ? current.slice(1) : '-' + current;
            updateDisplay();
        }

        function inputPercent() {
            const val = parseFloat(current);
            current = String(val / 100);
            updateDisplay();
        }

        document.addEventListener('keydown', function(e) {
            const key = e.key;
            if (/[0-9]/.test(key)) inputNumber(key);
            else if (key === '.') inputDot();
            else if (key === '+' || key === '-' || key === '*' || key === '/') inputOperator(key);
            else if (key === 'Enter' || key === '=') calculate();
            else if (key === 'Escape') clearAll();
            else if (key === 'Backspace') {
                if (current.length > 1 && current !== 'Error') {
                    current = current.slice(0, -1);
                } else {
                    current = '0';
                }
                updateDisplay();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
